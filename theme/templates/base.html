{% load static tailwind_tags %}
<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <title>{% block title %}Sanctuary | Calm Companion{% endblock %}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    {% tailwind_css %}
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-ds-background text-ds-on-background font-body-md selection:bg-ds-primary-fixed selection:text-ds-on-primary-fixed overflow-x-hidden">
    {% block content %}
    {% endblock %}
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>

{% load tailwind_tags %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — AI Secretary</title>
    {% tailwind_css %}
  </head>
  <body class="bg-gradient-to-br from-indigo-50 to-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-indigo-600">AI Secretary</h1>
        <p class="text-gray-500 mt-1 text-sm">Your intelligent daily planner</p>
      </div>

      <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-6">Create an account</h2>

        <form method="post">
          {% csrf_token %}

          {% for field in form %}
            <div class="mb-4">
              <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                {{ field.label }}
              </label>
              <input
                type="{{ field.field.widget.input_type }}"
                name="{{ field.html_name }}"
                id="{{ field.id_for_label }}"
                {% if field.value %}value="{{ field.value }}"{% endif %}
                class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition
                  {% if field.errors %}border-red-400{% endif %}"
              />
              {% for error in field.errors %}
                <p class="text-xs text-red-500 mt-1">{{ error }}</p>
              {% endfor %}
            </div>
          {% endfor %}

          <button
            type="submit"
            class="w-full bg-indigo-600 text-white font-medium py-2.5 rounded-lg hover:bg-indigo-700 transition-colors text-sm mt-2"
          >
            Create Account
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-gray-400 mt-6">
        Already have an account?
        <a href="{% url 'login' %}" class="text-indigo-500 hover:underline">Sign in</a>
      </p>
    </div>
  </body>
</html>

{% load tailwind_tags %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — AI Secretary</title>
    {% tailwind_css %}
  </head>
  <body class="bg-gradient-to-br from-indigo-50 to-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-sm">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-indigo-600">AI Secretary</h1>
        <p class="text-gray-500 mt-1 text-sm">Your intelligent daily planner</p>
      </div>

      <div class="bg-white rounded-2xl shadow-md p-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-6">Sign in to your account</h2>

        {% if form.errors %}
          <div class="mb-4 px-4 py-3 bg-red-50 text-red-700 border border-red-200 rounded-lg text-sm">
            Invalid username or password.
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-4">
            <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input
              type="text"
              name="username"
              id="id_username"
              autocomplete="username"
              autofocus
              required
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
              placeholder="Enter your username"
            />
          </div>
          <div class="mb-6">
            <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input
              type="password"
              name="password"
              id="id_password"
              autocomplete="current-password"
              required
              class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition"
              placeholder="Enter your password"
            />
          </div>
          <input type="hidden" name="next" value="{{ next }}" />
          <button
            type="submit"
            class="w-full bg-indigo-600 text-white font-medium py-2.5 rounded-lg hover:bg-indigo-700 transition-colors text-sm"
          >
            Sign In
          </button>
        </form>
      </div>

      <p class="text-center text-xs text-gray-400 mt-6">
        No account?
        <a href="{% url 'register' %}" class="text-indigo-500 hover:underline">Create one free</a>
      </p>
    </div>
  </body>
</html>

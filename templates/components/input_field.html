<div class="group space-y-unit">
    <label class="block font-label-md text-ds-on-surface-variant mb-xs ml-unit" for="{{ id }}">{{ label }}</label>
    {% if type == 'password' %}
    <div class="relative">
        <input class="w-full px-lg py-md bg-ds-surface-container border-none rounded-DEFAULT text-ds-on-surface placeholder:text-ds-outline/50 focus:ring-2 focus:ring-ds-primary-container transition-all duration-300 outline-none" id="{{ id }}" name="{{ id }}" placeholder="{{ placeholder }}" type="password"/>
        <button class="absolute right-md top-1/2 -translate-y-1/2 text-ds-on-surface-variant hover:text-ds-primary transition-colors" type="button">
            <span class="material-symbols-outlined">visibility</span>
        </button>
    </div>
    {% else %}
    <input class="w-full px-lg py-md bg-ds-surface-container border-none rounded-DEFAULT text-ds-on-surface placeholder:text-ds-outline/50 focus:ring-2 focus:ring-ds-primary-container transition-all duration-300 outline-none" id="{{ id }}" name="{{ id }}" placeholder="{{ placeholder }}" type="{{ type|default:'text' }}"/>
    {% endif %}
</div>

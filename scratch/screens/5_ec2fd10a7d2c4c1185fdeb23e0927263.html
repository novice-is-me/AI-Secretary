<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .organic-hover {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .organic-hover:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md md:p-xl font-body-md overflow-x-hidden">
<!-- Auth Container -->
<main class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-2 bg-surface-container-lowest rounded-lg overflow-hidden shadow-2xl shadow-primary/5 min-h-[700px]">
<!-- Left Column: Serene Image & Message -->
<section class="relative hidden md:flex flex-col justify-end p-xl overflow-hidden">
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover" data-alt="A serene indoor Zen garden corner with a smooth wooden floor, a minimal low table, and soft morning sunlight streaming through a large window. A single lush green plant sits in a textured clay pot. The color palette consists of soft oatmeal, warm wood tones, and gentle sage greens, creating a tranquil and grounded atmosphere. The lighting is high-key and airy, reflecting a digital sanctuary aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfoeD0x4hwQRqGbUP6b8q_4s0PGyfRObjm9B2DzZBmGKJhz47shuXIvRUAdYJWfGM921rGnzyJlJbgzBQYZPgBn4ggn9wBk4vvTPHx43S1PkO2sXbknFv2zOyqb7hdw2HPQ-xtXtyYSqjegda5fgJ3JXg_-Nt2iPpD9J86Uq2otdpwOdrpLCwLbpm_tw0FsWtVKgCwmAKxaflW6wAd8184GYZ529_V_yRH-00owYpgiQy9BapDvbnii7wTaU2nyzC4i8fY9dbCbTVV"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"></div>
</div>
<div class="relative z-10 text-white space-y-sm">
<h1 class="font-display-lg text-display-lg font-bold tracking-tight">Welcome back</h1>
<p class="font-body-lg text-body-lg opacity-90 max-w-md">Return to your center. Sanctuary is ready to help you navigate your day with clarity and calm.</p>
</div>
</section>
<!-- Right Column: Sign In Form -->
<section class="flex flex-col justify-center px-lg py-xl md:px-xxl bg-surface-container-low relative">
<!-- Mobile Header Logo -->
<div class="md:hidden absolute top-lg left-lg flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-3xl">spa</span>
<span class="font-headline-md text-primary font-extrabold tracking-tight">Sanctuary</span>
</div>
<div class="w-full max-w-sm mx-auto space-y-xl">
<!-- Header Text -->
<div class="space-y-sm">
<h2 class="font-headline-lg text-headline-lg text-on-surface font-semibold">Sign In</h2>
<p class="font-body-md text-on-surface-variant">Continue your journey with Sanctuary</p>
</div>
<!-- Form -->
<form class="space-y-lg">
<div class="space-y-md">
<!-- Email Field -->
<div class="space-y-unit">
<label class="font-label-md text-label-md text-on-surface-variant ml-unit" for="email">Email address</label>
<input class="w-full px-lg py-md bg-surface-container rounded-DEFAULT border-none focus:ring-2 focus:ring-primary-container transition-all outline-none text-on-surface placeholder:text-outline-variant font-body-md" id="email" placeholder="hello@sanctuary.com" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-unit">
<div class="flex justify-between items-center px-unit">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<input class="w-full px-lg py-md bg-surface-container rounded-DEFAULT border-none focus:ring-2 focus:ring-primary-container transition-all outline-none text-on-surface placeholder:text-outline-variant font-body-md" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full py-md bg-primary text-white font-label-md text-label-md rounded-full organic-hover shadow-lg shadow-primary/20" type="submit">
                        Sign In
                    </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-md">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-md font-label-sm text-label-sm text-outline-variant">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-md">
<button class="flex items-center justify-center gap-sm py-md bg-surface-container-lowest border border-outline-variant rounded-full organic-hover">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-sm py-md bg-surface-container-lowest border border-outline-variant rounded-full organic-hover">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.96.95-2.04 1.44-3.23 1.44-1.22 0-2.27-.47-3.41-1.44-1.19.98-2.24 1.47-3.38 1.47-1.18 0-2.27-.49-3.23-1.47C1.42 17.84 0 14.48 0 10.5c0-3.69 1.44-6.38 4.1-6.38 1.25 0 2.29.5 3.12 1.5.83-1 1.88-1.5 3.12-1.5 2.65 0 4.1 2.69 4.1 6.38 0 3.98-1.42 7.34-3.79 9.78zM12 4.14c0-1.15-.46-2.19-1.24-2.93a4.03 4.03 0 0 0-3-.95c.04 1.15.52 2.16 1.33 2.89.81.73 1.94 1.12 2.91.99z"></path>
</svg>
<span class="font-label-md text-label-md text-on-surface">Apple</span>
</button>
</div>
<!-- Footer Link -->
<p class="text-center font-body-md text-on-surface-variant">
                    New to Sanctuary? 
                    <a class="text-primary font-semibold hover:underline underline-offset-4" href="#">Create an account</a>
</p>
</div>
<!-- Decorative Secretary Presence -->
<div class="absolute -bottom-12 -right-12 w-64 h-64 bg-primary-fixed opacity-10 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute top-20 -left-10 w-40 h-40 bg-secondary-fixed opacity-10 rounded-full blur-2xl pointer-events-none"></div>
</section>
</main>
<!-- Global AI Presence Component -->
<div class="fixed bottom-xl right-xl z-50">
<button class="glass-panel p-md rounded-full shadow-lg shadow-primary/10 organic-hover flex items-center gap-sm group">
<div class="w-3 h-3 bg-primary rounded-full animate-pulse"></div>
<span class="material-symbols-outlined text-primary text-2xl">auto_awesome</span>
<div class="absolute right-0 bottom-full mb-md w-64 glass-panel p-lg rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none translate-y-2 group-hover:translate-y-0 duration-300">
<p class="font-label-sm text-label-sm text-primary mb-unit">Sanctuary Companion</p>
<p class="font-body-md text-on-surface-variant">"Take a deep breath before you begin. I'm here to support your workflow today."</p>
</div>
</button>
</div>
</body></html>
